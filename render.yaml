services:
  - type: web
    name: car-rent-frontend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: API_UPSTREAM
        sync: false

  - type: web
    name: car-rent-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: backend-storage
      mountPath: /app/storage
      sizeGB: 10
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: car-rent-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: car-rent-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: car-rent-db
          property: password
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_PAYMENT_PROVIDER
        value: razorpay
      - key: APP_PAYMENT_RAZORPAY_KEY_ID
        sync: false
      - key: APP_PAYMENT_RAZORPAY_KEY_SECRET
        sync: false
      - key: APP_PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: CARNALYSYS_STORAGE_AVATAR_DIR
        value: /app/storage/uploads/avatars
      - key: CARNALYSYS_STORAGE_VEHICLES_DIR
        value: /app/storage/uploads/vehicles
      - key: CARNALYSYS_STORAGE_RECEIPTS_DIR
        value: /app/storage/uploads/receipts
      - key: CARNALYSYS_STORAGE_LOGS_DIR
        value: /app/storage/logs

databases:
  - name: car-rent-db
    plan: starter

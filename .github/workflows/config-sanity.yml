name: Config Sanity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [development, uat, production]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend for mode
        run: npm run build -- --mode ${{ matrix.mode }}

  backend-profile-sanity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [local, uat, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run profile config sanity test
        working-directory: backend
        env:
          TEST_PROFILE: ${{ matrix.profile }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/carnalysys
          SPRING_DATASOURCE_USERNAME: carnalysys
          SPRING_DATASOURCE_PASSWORD: carnalysys_dev
          APP_JWT_SECRET: test-jwt-secret-for-ci-profile-checks-min-32-bytes
          APP_PAYMENT_WEBHOOK_SECRET: test-payment-webhook-secret
          APP_CORS_ALLOWED_ORIGINS: http://localhost:5199
        run: ./mvnw -q -Dtest=ProfileConfigurationSanityTest test

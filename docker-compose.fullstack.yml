services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BASE_PATH: /
        VITE_API_BASE: /api/v1
    depends_on:
      api:
        condition: service_started
    ports:
      - "5199:80"
    restart: unless-stopped

  api:
    image: ${CARNALYSYS_API_IMAGE:-carnalysys-api:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "${SERVER_PORT:-8080}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: carnalysys
      POSTGRES_PASSWORD: carnalysys_dev
      POSTGRES_DB: carnalysys
      PGUSER: carnalysys
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carnalysys_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carnalysys -d carnalysys"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: carnalysys
      POSTGRES_PASSWORD: carnalysys_dev
      POSTGRES_DB: carnalysys
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@carnalysys.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "5050:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./db/pgadmin/bootstrap.sh:/bootstrap.sh:ro
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    entrypoint: ["/bin/bash", "/bootstrap.sh"]

volumes:
  carnalysys_pgdata:

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BASE_PATH: /
        VITE_API_BASE: /api/v1
    depends_on:
      api:
        condition: service_started
    ports:
      - "5199:80"
    restart: unless-stopped

  api:
    image: ${CARNALYSYS_API_IMAGE:-carnalysys-api:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "${SERVER_PORT:-8080}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: carnalysys
      POSTGRES_PASSWORD: carnalysys_dev
      POSTGRES_DB: carnalysys
      PGUSER: carnalysys
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carnalysys_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carnalysys -d carnalysys"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  carnalysys_pgdata:
